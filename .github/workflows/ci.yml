name: Unit Tests

on:
  push:
    branches: [main]
    paths: &test_paths
      - .github/workflows/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - tests/**
      - src/**

  pull_request:
    paths: *test_paths

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rust (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            quality: true
            cache_scope: quality
          - os: macos-latest
            quality: false
            cache_scope: platform
          - os: windows-latest
            quality: false
            cache_scope: platform

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.quality
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.cache_scope }}
          cache-on-failure: true
      - if: matrix.quality
        run: cargo fmt
            --check
      - if: matrix.quality
        run: cargo clippy
            --all-targets
            --all-features
            -- -D warnings
      - name: Run test suite with Cargo
        if: matrix.quality
        run: cargo test
            --profile ci-dev
            --all-targets
            --locked
      - name: Install cargo-nextest
        if: matrix.quality == false
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Run test suite with nextest
        if: matrix.quality == false
        run: cargo nextest run
            --cargo-profile ci-dev
            --all-targets
            --locked
            --no-fail-fast
      - name: Smoke-test the extension entrypoint
        if: matrix.quality
        run: cargo run
            --locked
            -- --help
