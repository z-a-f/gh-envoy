name: Unit Tests

on:
  push:
    branches: [main]
    paths: &test_paths
      - .github/workflows/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - tests/**
      - src/**

  pull_request:
    paths: *test_paths

permissions:
  contents: read

jobs:
  test:
    name: Rust (${{ matrix.os }})

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: true
      - run: cargo fmt
            --check
      - run: cargo clippy
            --all-targets
            --all-features
            -- -D warnings
      - run: cargo test
            --profile ci-dev
            --all-targets
            --locked
      - run: cargo build
            --locked
      - name: Smoke-test the extension entrypoint
        run: cargo run
            --locked
            -- --help
